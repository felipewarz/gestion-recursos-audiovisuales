<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente Inteligente</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        .bot-container {
            max-width: 1100px;
            margin: 30px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        .bot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .bot-card {
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 28px;
            min-height: 110px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.35);
            transition: 0.2s;
        }

        .bot-card:hover {
            transform: translateY(-3px);
            background: #0b5ed7;
        }

        #respuesta {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: #f1f5ff;
            border-left: 5px solid #0d6efd;
            white-space: pre-line;
            font-size: 16px;
        }
    </style>
</head>
<body>

<header class="topbar">
    <h1>Asistente Inteligente</h1>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="recursos.html">Recursos</a>
        <a href="solicitud.html">Solicitudes</a>
        <a href="historial.html">Historial</a>
        <a href="bot.html">Asistente</a>
        <a href="index.html">Cerrar sesión</a>
    </nav>
</header>

<main class="bot-container">
    <h2>Consulta al asistente</h2>
    <p>
        Selecciona una actividad y el sistema recomendará recursos audiovisuales disponibles
        según la necesidad indicada.
    </p>

    <h3>Ejemplos de consultas</h3>

    <div class="bot-grid">
        <button class="bot-card" onclick="preguntaRapida('Necesito hacer una sesión de fotos profesional.')">
            📷 Sesión de fotos profesional
        </button>

        <button class="bot-card" onclick="preguntaRapida('Necesito grabar una entrevista.')">
            🎥 Grabar una entrevista
        </button>

        <button class="bot-card" onclick="preguntaRapida('Haré una presentación para 30 personas.')">
            🖥️ Presentación para 30 personas
        </button>

        <button class="bot-card" onclick="preguntaRapida('Necesito realizar una videoconferencia.')">
            👥 Videoconferencia
        </button>

        <button class="bot-card" onclick="preguntaRapida('Necesito apoyo de sonido para una actividad.')">
            🔊 Apoyo de sonido
        </button>
    </div>

    <div id="respuesta">
        La recomendación del asistente aparecerá aquí.
    </div>
</main>

<script>
function preguntaRapida(texto) {
    const respuesta = document.getElementById("respuesta");

    respuesta.innerText = "Analizando la actividad y buscando recursos disponibles...";

    fetch("/bot", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ pregunta: texto })
    })
    .then(res => res.json())
    .then(data => {
        respuesta.innerText = data.respuesta;
    })
    .catch(error => {
        console.error(error);
        respuesta.innerText = "Error al consultar el asistente.";
    });
}
</script>

</body>
</html>

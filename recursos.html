<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recursos Audiovisuales</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Recursos audiovisuales disponibles</h1>

<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="solicitud.html">Crear solicitud</a>
    <a href="historial.html">Historial</a>
    <a href="index.html">Cerrar sesión</a>
</nav>

<button onclick="cargarRecursos()">Cargar recursos</button>

<table border="1" cellpadding="8">
    <thead>
        <tr>
            <th>ID</th>
            <th>Recurso</th>
            <th>Descripción</th>
            <th>Categoría</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody id="tablaRecursos"></tbody>
</table>

<script>
function cargarRecursos() {
    fetch("/recursos")
        .then(res => res.json())
        .then(data => {
            const tabla = document.getElementById("tablaRecursos");
            tabla.innerHTML = "";

            data.forEach(recurso => {
                tabla.innerHTML += `
                    <tr>
                        <td>${recurso.id_recurso}</td>
                        <td>${recurso.nombre}</td>
                        <td>${recurso.descripcion}</td>
                        <td>${recurso.id_categoria}</td>
                        <td>${recurso.id_estado}</td>
                    </tr>
                `;
            });
        })
        .catch(error => {
            console.error(error);
            alert("Error al cargar recursos");
        });
}
</script>

</body>
</html>

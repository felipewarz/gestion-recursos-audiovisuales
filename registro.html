<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Registro de Usuario</h1>

<nav>
    <a href="index.html">Volver al login</a>
</nav>

<input type="text" id="nombre" placeholder="Nombre"><br><br>
<input type="email" id="correo" placeholder="Correo"><br><br>
<input type="password" id="contrasena" placeholder="Contraseña"><br><br>

<button onclick="registrarUsuario()">Registrar</button>

<p id="mensaje"></p>

<script>
function registrarUsuario() {
    const nombre = document.getElementById("nombre").value;
    const correo = document.getElementById("correo").value;
    const contrasena = document.getElementById("contrasena").value;

    fetch("/registro", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nombre,
            correo,
            contrasena
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("mensaje").innerText =
            data.mensaje || data.error || "Operación realizada";
    })
    .catch(error => {
        console.error(error);
        document.getElementById("mensaje").innerText =
            "Error al registrar usuario";
    });
}
</script>

</body>
</html>

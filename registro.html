<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Gestión Audiovisual</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <h1>Crear cuenta</h1>
            <p class="login-subtitle">Registro de usuario solicitante</p>

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre">
            </div>

            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="Ingrese su correo">
            </div>

            <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" placeholder="Ingrese su contraseña">
            </div>

            <button onclick="registrarUsuario()" class="btn-primary">
                Registrarse
            </button>

            <p id="resultado" class="mensaje"></p>

            <p class="login-link">
                ¿Ya tienes cuenta?
                <a href="index.html">Iniciar sesión</a>
            </p>
        </div>
    </div>

<script>
function registrarUsuario() {
    const nombre = document.getElementById("nombre").value;
    const correo = document.getElementById("correo").value;
    const contrasena = document.getElementById("contrasena").value;
    const resultado = document.getElementById("resultado");

    if (!nombre || !correo || !contrasena) {
        resultado.innerText = "Debe completar todos los campos.";
        resultado.className = "mensaje error";
        return;
    }

  fetch("/registro", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nombre,
            correo,
            contrasena
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            resultado.innerText = data.error;
            resultado.className = "mensaje error";
            return;
        }

        resultado.innerText = data.mensaje + ". Redirigiendo al login...";
        resultado.className = "mensaje exito";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1500);
    })
    .catch(error => {
        console.error(error);
        resultado.innerText = "Error de conexión con el servidor.";
        resultado.className = "mensaje error";
    });
}
</script>

</body>
</html>

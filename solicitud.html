<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Solicitud</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Crear Solicitud de Préstamo</h1>

<nav>
    <a href="recursos.html">Recursos</a>
    <a href="historial.html">Historial</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="index.html">Cerrar sesión</a>
</nav>

<input type="number" id="id_usuario" placeholder="ID Usuario"><br><br>
<input type="number" id="id_recurso" placeholder="ID Recurso"><br><br>
<input type="date" id="fecha_inicio"><br><br>
<input type="date" id="fecha_fin"><br><br>

<button onclick="crearSolicitud()">Crear Solicitud</button>

<p id="mensaje"></p>

<script>
function crearSolicitud() {
    const id_usuario = document.getElementById("id_usuario").value;
    const id_recurso = document.getElementById("id_recurso").value;
    const fecha_inicio = document.getElementById("fecha_inicio").value;
    const fecha_fin = document.getElementById("fecha_fin").value;

    fetch("/solicitudes", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id_usuario,
            id_recurso,
            fecha_inicio,
            fecha_fin
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("mensaje").innerText =
            data.mensaje || data.error || "Operación realizada";
    })
    .catch(error => {
        console.error(error);
        document.getElementById("mensaje").innerText =
            "Error al crear solicitud";
    });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrador</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Panel Administrador</h1>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="recursos.html">Recursos</a>
        <a href="historial.html">Historial</a>
        <a href="index.html">Cerrar sesión</a>
    </nav>

    <section>
        <h2>Recursos audiovisuales</h2>

        <button onclick="cargarRecursos()">Cargar recursos</button>

        <table border="1" cellpadding="8">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Recurso</th>
                    <th>Descripción</th>
                    <th>Categoría</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tablaRecursos"></tbody>
        </table>
    </section>

    <section>
        <h2>Registrar nuevo recurso</h2>

        <input type="text" id="nombre" placeholder="Nombre del recurso"><br><br>
        <input type="text" id="descripcion" placeholder="Descripción"><br><br>
        <input type="number" id="id_categoria" placeholder="ID Categoría"><br><br>
        <input type="number" id="id_estado" placeholder="ID Estado"><br><br>

        <button onclick="crearRecurso()">Guardar recurso</button>

        <p id="mensaje"></p>
    </section>

    <script>
        function cargarRecursos() {
            fetch("/recursos")
                .then(res => res.json())
                .then(data => {
                    const tabla = document.getElementById("tablaRecursos");
                    tabla.innerHTML = "";

                    data.forEach(recurso => {
                        tabla.innerHTML += `
                            <tr>
                                <td>${recurso.id_recurso}</td>
                                <td>${recurso.nombre}</td>
                                <td>${recurso.descripcion}</td>
                                <td>${recurso.id_categoria}</td>
                                <td>${recurso.id_estado}</td>
                            </tr>
                        `;
                    });
                })
                .catch(error => {
                    console.error("Error al cargar recursos:", error);
                    alert("Error al cargar recursos");
                });
        }

        function crearRecurso() {
            const nombre = document.getElementById("nombre").value;
            const descripcion = document.getElementById("descripcion").value;
            const id_categoria = document.getElementById("id_categoria").value;
            const id_estado = document.getElementById("id_estado").value;

            fetch("/recursos", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nombre,
                    descripcion,
                    id_categoria,
                    id_estado
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("mensaje").innerText =
                    data.mensaje || data.error || "Operación realizada";

                cargarRecursos();
            })
            .catch(error => {
                console.error("Error al guardar recurso:", error);
                document.getElementById("mensaje").innerText =
                    "Error al guardar recurso";
            });
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Solicitudes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Historial de Solicitudes</h1>

<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="recursos.html">Recursos</a>
    <a href="solicitud.html">Crear solicitud</a>
    <a href="index.html">Cerrar sesión</a>
</nav>

<button onclick="cargarSolicitudes()">Cargar historial</button>

<table border="1" cellpadding="8">
    <thead>
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Recurso</th>
            <th>Fecha inicio</th>
            <th>Fecha fin</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody id="tablaSolicitudes"></tbody>
</table>

<script>
function cargarSolicitudes() {
    fetch("/solicitudes")
        .then(res => res.json())
        .then(data => {
            const tabla = document.getElementById("tablaSolicitudes");
            tabla.innerHTML = "";

            data.forEach(item => {
                tabla.innerHTML += `
                    <tr>
                        <td>${item.id_solicitud}</td>
                        <td>${item.usuario || item.id_usuario}</td>
                        <td>${item.recurso || item.id_recurso || ""}</td>
                        <td>${item.fecha_inicio}</td>
                        <td>${item.fecha_fin}</td>
                        <td>${item.estado || item.id_estado_solicitud}</td>
                    </tr>
                `;
            });
        })
        .catch(error => {
            console.error(error);
            alert("Error al cargar historial");
        });
}
</script>

</body>
</html>
